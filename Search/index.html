<input type="text" id="search-input" placeholder="Search with title, contents..."></input><br><br>
<p id="search-result">

</p>
</div>

<script>
    document.getElementById("search-input").addEventListener('input', () => {
        if (!CONFIG.path) {
          // Search DB path
          console.warn('`hexo-generator-searchdb` plugin is not installed!');
          return;
        }
        const localSearch = new LocalSearch({
            path             : CONFIG.path,
            top_n_per_article: CONFIG.localsearch.top_n_per_article,
            unescape         : CONFIG.localsearch.unescape
        });
        
        const input = document.querySelector('input');
        input.value = document.getElementById("search-input").value;
        
        const inputEventFunction = () => {
            if (!localSearch.isfetched) return;
            const searchText = input.value.trim().toLowerCase();
            const keywords = searchText.split(/[-\s]+/);
            const container = document.querySelector('.search-result-container');
            let resultItems = [];
            if (searchText.length > 0) {
            // Perform local searching
            resultItems = localSearch.getResultItems(keywords);
            }
            if (keywords.length === 1 && keywords[0] === '') {
            document.getElementById("search-result").classList.add('no-result');
            document.getElementById("search-result").innerHTML = '<div></div>';
            } else if (resultItems.length === 0) {
            document.getElementById("search-result").classList.add('no-result');
            document.getElementById("search-result").innerHTML = '<div class="text"> No relative articles</div>';
            } else {
            resultItems.sort((left, right) => {
                if (left.includedCount !== right.includedCount) {
                return right.includedCount - left.includedCount;
                } else if (left.hitCount !== right.hitCount) {
                return right.hitCount - left.hitCount;
                }
                return right.id - left.id;
            });
            const stats = CONFIG.i18n.hits.replace('${hits}', resultItems.length);
            const titleRegexPre = "search-result-title\">";
            const titleRegexPro = "</a><a";
            const linkRegexPre = "<li><a href=\"";
            const linkRegexPro = '/?highlight=';
            const markRegex1 = '<mark class="search-keyword">';
            const markRegex2 = "</mark>";
            
            function listArticle(resultItems){
                const articles = [];
                for (let i = 0; i < resultItems.length; i ++ ){
                    var item = resultItems[i].item;
                    var title = item.substring(item.match(titleRegexPre).index + titleRegexPre.length, item.match(titleRegexPro).index);
                    var title = title.replaceAll(markRegex1, "").replaceAll(markRegex2, "");
                    console.log(title)
                    var link = item.substring(item.match(linkRegexPre).index + linkRegexPre.length, item.match(linkRegexPro).index - 2);
                    var link = link.replaceAll(markRegex1, "").replaceAll(markRegex2, "");
                    console.log(link)
                    articles[i] = '<li><a href="' + link + '" class=\"search-result-title\"> <mark class = "search-keyword" > ' + title + " </mark></a></li>";
                }
                
                return articles;
            }

            const articles = listArticle(resultItems);

            document.getElementById("search-result").classList.remove('no-result');
            document.getElementById("search-result").innerHTML = `<div class="search-stats">${stats}</div>
                <hr>
                <ul class="search-result-list">${articles.join('')}</ul>`;
            if (typeof pjax === 'object') pjax.refresh(container);
            }
        };
        
        localSearch.highlightSearchWords(document.querySelector('.post-body'));
        if (CONFIG.localsearch.preload) {
            localSearch.fetchData();
        }
        
        if (CONFIG.localsearch.trigger === 'auto') {
            input.addEventListener('input', inputEventFunction);
        } else {
            document.querySelector('.search-icon').addEventListener('click', inputEventFunction);
            input.addEventListener('keypress', event => {
            if (event.key === 'Enter') {
                inputEventFunction();
            }
            });
        }
        window.addEventListener('search:loaded', inputEventFunction);
        
        // Handle and trigger popup window
        document.querySelectorAll('.popup-trigger').forEach(element => {
            element.addEventListener('click', () => {
            document.body.classList.add('search-active');
            // Wait for search-popup animation to complete
            setTimeout(() => input.focus(), 500);
            if (!localSearch.isfetched) localSearch.fetchData();
            });
        });
    });
</script>
